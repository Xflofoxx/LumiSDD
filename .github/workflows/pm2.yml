name: PM2 Workflow

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'PM2 Action'
        required: true
        type: choice
        options:
          - create-charter
          - create-milestone
          - create-release
          - update-issues
      phase:
        description: 'PM2 Phase'
        required: true
        type: choice
        options:
          - initiating
          - planning
          - executing
          - closing
      version:
        description: 'Version (semver)'
        required: false
        default: '1.0.0'

jobs:
  pm2-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PM2 Action
        env:
          ACTION: ${{ github.event.inputs.action }}
          PHASE: ${{ github.event.inputs.phase }}
          VERSION: ${{ github.event.inputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running PM2 Workflow: $ACTION for phase: $PHASE"
          
          if [ "$ACTION" = "create-charter" ]; then
            echo "Creating PM2 Charter for $PHASE phase..."
            # Create charter issue
            gh issue create \
              --title "PM2 $PHASE Phase - Project Charter" \
              --body "## PM2 $PHASE Phase - Project Charter
              
**Phase:** $PHASE
**Created by:** LumiSDD PM2 Workflow

### Stakeholders
- [ ] Project Owner identified
- [ ] Business Manager identified
- [ ] Solution Provider identified

### Objectives
- [ ] Define project objectives
- [ ] Identify key deliverables
- [ ] Assess initial risks

### Deliverables
- [ ] Project Charter Document
- [ ] Stakeholder Register
- [ ] Risk Register" \
              --label "pm2,$PHASE,charter"
          fi
          
          if [ "$ACTION" = "create-milestone" ]; then
            echo "Creating milestone for $PHASE phase v$VERSION..."
            gh milestone create \
              --title "PM2 $PHASE - v$VERSION" \
              --description "PM2 $PHASE phase milestone for version $VERSION"
          fi
          
          if [ "$ACTION" = "create-release" ]; then
            echo "Creating release v$VERSION for $PHASE phase..."
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi
          
          if [ "$ACTION" = "update-issues" ]; then
            echo "Updating issues for $PHASE phase..."
            gh issue list --label "$PHASE" --state all
          fi
